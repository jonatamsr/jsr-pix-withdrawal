services:
  jsr-pix-withdrawal:
    container_name: jsr-pix-withdrawal
    image: jsr-pix-withdrawal
    build:
      dockerfile: dev.Dockerfile
      args:
        UID: 1000
        GID: 1000
    volumes:
      - ./:/opt/www
    ports:
      - 9501:9501
    environment:
      - APP_ENV=dev
      - SCAN_CACHEABLE=false

networks:
  default:
    name: jsr-pix-withdrawal
