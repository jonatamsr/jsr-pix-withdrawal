name: Lint

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  php-cs-fixer:
    name: PHP-CS-Fixer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: php-cs-fixer
          coverage: none

      - name: Cache PHP-CS-Fixer
        uses: actions/cache@v4
        with:
          path: .php-cs-fixer.cache
          key: php-cs-fixer-${{ hashFiles('.php-cs-fixer.php') }}
          restore-keys: php-cs-fixer-

      - name: Run PHP-CS-Fixer
        id: cs-fixer
        run: |
          set +e
          php-cs-fixer fix --dry-run --diff --format=json > /tmp/cs-fixer-report.json 2>/dev/null
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Annotate violations
        if: steps.cs-fixer.outputs.exit_code != '0'
        run: |
          php -r '
            $json = json_decode(file_get_contents("/tmp/cs-fixer-report.json"), true);
            foreach ($json["files"] ?? [] as $file) {
              $name = $file["name"];
              $rules = implode(", ", $file["appliedFixers"] ?? []);
              $line = 1;
              if (preg_match("/@@ -(\d+)/", $file["diff"] ?? "", $m)) {
                $line = (int) $m[1];
              }
              echo "::error file={$name},line={$line}::Code style: {$rules}" . PHP_EOL;
            }
          '

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const exitCode = '${{ steps.cs-fixer.outputs.exit_code }}';
            const passed = exitCode === '0';

            let body;

            if (passed) {
              body = '## 🟢 PHP-CS-Fixer\n\nNo code style violations found.';
            } else {
              const report = JSON.parse(fs.readFileSync('/tmp/cs-fixer-report.json', 'utf8'));
              const files = report.files || [];

              let table = '| File | Violations |\n|---|---|\n';
              let diffs = '';

              for (const file of files) {
                const rules = (file.appliedFixers || []).map(r => '`' + r + '`').join(', ');
                table += `| \`${file.name}\` | ${rules} |\n`;

                if (file.diff) {
                  diffs += `<details>\n<summary><code>${file.name}</code></summary>\n\n\`\`\`diff\n${file.diff}\n\`\`\`\n</details>\n\n`;
                }
              }

              body = [
                '## 🔴 PHP-CS-Fixer',
                '',
                `**${files.length}** file(s) with code style violations:`,
                '',
                table,
                diffs ? '### Diffs\n\n' + diffs : '',
                'Run `make cs-fix` to fix automatically.',
              ].join('\n');
            }

            body += `\n\n> Generated by workflow run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user?.type === 'Bot' && /## [🟢🔴] PHP-CS-Fixer/.test(c.body)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if violations found
        if: steps.cs-fixer.outputs.exit_code != '0'
        run: exit 1
