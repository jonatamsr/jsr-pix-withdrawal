name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: swoole, redis, pdo_mysql, grpc, protobuf
          ini-values: grpc.enable_fork_support=1
          coverage: pcov

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run unit tests
        run: composer test

      - name: Coverage summary
        if: always()
        run: |
          if [ ! -f coverage/coverage.xml ]; then
            echo "⚠️ Coverage report not generated" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          METRICS=$(php -r '
            $xml = simplexml_load_file("coverage/coverage.xml");
            $metrics = $xml->project->metrics;
            $stmts = (int) $metrics["statements"];
            $covered = (int) $metrics["coveredstatements"];
            $methods = (int) $metrics["methods"];
            $coveredMethods = (int) $metrics["coveredmethods"];
            $classes = (int) $metrics["classes"];
            $coveredClasses = (int) $metrics["coveredclasses"];
            $linePct = $stmts > 0 ? round($covered / $stmts * 100, 2) : 0;
            $methodPct = $methods > 0 ? round($coveredMethods / $methods * 100, 2) : 0;
            echo json_encode([
              "lines" => "$covered/$stmts ($linePct%)",
              "methods" => "$coveredMethods/$methods ($methodPct%)",
              "line_pct" => $linePct,
            ]);
          ')

          LINE_PCT=$(echo "$METRICS" | php -r 'echo json_decode(file_get_contents("php://stdin"))->line_pct;')
          LINES=$(echo "$METRICS" | php -r 'echo json_decode(file_get_contents("php://stdin"))->lines;')
          METHODS=$(echo "$METRICS" | php -r 'echo json_decode(file_get_contents("php://stdin"))->methods;')

          if (( $(echo "$LINE_PCT >= 80" | bc -l) )); then
            BADGE="🟢"
          elif (( $(echo "$LINE_PCT >= 60" | bc -l) )); then
            BADGE="🟡"
          else
            BADGE="🔴"
          fi

          COMMENT_BODY=$(cat <<EOF
          ## $BADGE Code Coverage

          | Metric       | Coverage       |
          |--------------|----------------|
          | **Lines**    | $LINES         |
          | **Methods**  | $METHODS       |

          > Generated by workflow run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
          )

          echo "$COMMENT_BODY" >> "$GITHUB_STEP_SUMMARY"
          echo "COVERAGE_COMMENT<<GHEOF" >> "$GITHUB_ENV"
          echo "$COMMENT_BODY" >> "$GITHUB_ENV"
          echo "GHEOF" >> "$GITHUB_ENV"

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const body = process.env.COVERAGE_COMMENT;
            if (!body) return;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '## 🟢 Code Coverage\n|## 🟡 Code Coverage\n|## 🔴 Code Coverage';
            const existing = comments.find(c =>
              c.user.type === 'Bot' && /## [🟢🟡🔴] Code Coverage/.test(c.body)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  static-analysis:
    name: PHPStan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: swoole, redis, pdo_mysql, grpc, protobuf
          ini-values: grpc.enable_fork_support=1
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: composer analyse
